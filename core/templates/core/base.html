{% load static %}

<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Gustus</title>
    <link rel="stylesheet" href="{% static 'core/styles.css' %}">
</head>
<body>
    <header class="site-header">
        <h1><a href="{% url 'home' %}">Gustus</a></h1>

        <nav class="site-nav">
            <a href="{% url 'restaurants' %}">Restaurants</a>
            <a href="{% url 'urprofiles' %}">Your restaurants</a>
            <a href="{% url 'urexperiences' %}">Experiences</a>
            <a href="{% url 'ratings' %}">Ratings</a>

            {% if user.is_authenticated %}
                <span class="user-label">{{ user.username }}</span>
                <form action="{% url 'logout' %}" method="post" class="inline-form">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
            {% endif %}
        </nav>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
