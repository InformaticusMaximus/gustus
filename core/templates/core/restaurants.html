{% extends "core/base.html" %}

{% block content %}
<h2>Restaurants</h2>

<div class="grid">
    {% for restaurant in restaurants %}
        <article class="card">
            <h3>{{ restaurant.name }}</h3>
            <p>{{ restaurant.address }}</p>
            <p>{{ restaurant.city }}</p>
        </article>
    {% empty %}
        <p>No restaurants found.</p>
    {% endfor %}
</div>
{% endblock %}
